<div class="card">
  <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Calendario delle Visite</h5>
    <div>
      <button class="btn btn-sm btn-outline-light" (click)="previousWeek()">← Settimana Precedente</button>
      <span class="mx-3 fw-bold">
        {{ formatDate(weekStart()) }} - {{ formatDate(days()[6]) }}
      </span>
      <button class="btn btn-sm btn-outline-light" (click)="nextWeek()">Settimana Successiva →</button>
    </div>
  </div>

  <div class="card-body p-0" style="overflow-x: auto;">
    <!-- Intestazione giorni della settimana -->
    <table class="table table-bordered mb-0">
      <thead class="table-light">
        <tr>
          <th class="text-center" style="width: 10%; min-width: 80px;">
            <small>Fascia Oraria</small>
          </th>
          <th *ngFor="let day of days()" class="text-center" style="width: 12.9%; min-width: 120px;">
            <div class="fw-bold">{{ getDayName(day) }}</div>
            <small class="text-muted">{{ formatDate(day) }}</small>
          </th>
        </tr>
      </thead>
      <!-- Slot orari -->
      <tbody>
        <tr *ngFor="let hour of hours">
          <td class="text-center fw-bold" style="width: 10%; min-width: 80px;">
            {{ hour }}:00 - {{ hour + 1 }}:00
          </td>
          <td *ngFor="let day of days()" class="p-2 text-center slot" style="width: 12.9%; min-width: 120px; min-height: 80px; vertical-align: top;">
            <ng-container *ngIf="getVisitaSlot(day, hour) as visita">
              <div *ngIf="visita" class="alert alert-success p-2 mb-0 cursor-pointer" (click)="onVisitaClick(visita)" role="button">
                <small class="fw-bold">{{ visita.medicoNome }} {{ visita.medicoCognome }}</small>
                <br />
                <small class="text-muted">{{ visita.reparto }}</small>
              </div>
            </ng-container>
            <div *ngIf="!getVisitaSlot(day, hour)" class="text-muted small p-2">
              Disponibile
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
